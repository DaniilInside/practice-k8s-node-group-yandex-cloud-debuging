{{- if .Values.pdb.create }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "debug-practice-chart.fullname" . }}-pdb
  namespace: {{ include "debug-practice-chart.namespace" . }}
  labels:
    {{- include "debug-practice-chart.labels" . | nindent 4 }}
spec:
  {{- if .Values.pdb.minAvailable }}
  minAvailable: {{ .Values.pdb.minAvailable }}
  {{- else if .Values.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "debug-practice-chart.selectorLabels" . | nindent 6 }}
{{- end }}
